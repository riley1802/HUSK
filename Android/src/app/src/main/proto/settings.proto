syntax = "proto3";

package com.google.ai.edge.gallery.proto;

option java_package = "com.google.ai.edge.gallery.proto";
option java_multiple_files = true;

enum Theme {
  THEME_UNSPECIFIED = 0;

  // Force to use light theme.
  THEME_LIGHT = 1;

  // Force to use dark theme.
  THEME_DARK = 2;

  // Use the system them setting on user's phone.
  THEME_AUTO = 3;
}

enum FontScale {
  FONT_SCALE_UNSPECIFIED = 0;
  FONT_SCALE_SMALL = 1;
  FONT_SCALE_DEFAULT = 2;
  FONT_SCALE_LARGE = 3;
  FONT_SCALE_EXTRA_LARGE = 4;
}

enum ChatDensity {
  CHAT_DENSITY_UNSPECIFIED = 0;
  CHAT_DENSITY_COMPACT = 1;
  CHAT_DENSITY_COMFORTABLE = 2;
  CHAT_DENSITY_SPACIOUS = 3;
}

message AccessTokenData {
  string access_token = 1;
  string refresh_token = 2;
  int64 expires_at_ms = 3;
}

message ImportedModel {
  string file_name = 1;
  int64 file_size = 2;

  oneof config {
    LlmConfig llm_config = 3;
  }
}

message LlmConfig {
  repeated string compatible_accelerators = 1;
  int32 default_max_tokens = 2;
  int32 default_topk = 3;
  float default_topp = 4;
  float default_temperature = 5;
  bool support_image = 6;
  bool support_audio = 7;
  bool support_tiny_garden = 8;
  bool support_mobile_actions = 9;
  bool support_thinking = 10;
}

message Settings {
  Theme theme = 1;
  AccessTokenData access_token_data = 2;  // deprecated
  repeated string text_input_history = 3;
  repeated ImportedModel imported_model = 4;
  // Has the app tos been accepted.
  bool is_tos_accepted = 5;
  bool has_run_tiny_garden = 6;
  bool has_seen_benchmark_comparison_help = 7;
  // Has the Gemma terms of use been accepted.
  bool is_gemma_terms_accepted = 8;
  // copybara:strip_begin(google-internal)
  // Feature flags
  map<string, bool> feature_flags = 9;
  // copybara:strip_end

  repeated string viewed_promo_id = 10;

  // Appearance preferences.
  bool amoled_mode = 11;
  int32 accent_color_argb = 12;  // 0 = use default sand accent
  FontScale font_scale = 13;
  ChatDensity chat_density = 14;

  // Notes brainstorm system prompts (user-editable, per model).
  string notes_e2b_system_prompt = 15;
  string notes_e4b_system_prompt = 16;
  // Which model the Notes screen defaults to ("e2b" or "e4b").
  string notes_selected_model = 17;
}

message UserData {
  AccessTokenData access_token_data = 1;
  map<string, string> secrets = 2;
}

enum FillMode {
  FILL_MODE_UNSPECIFIED = 0;
  FILL_MODE_DISABLED = 1;
  FILL_MODE_SOLID = 2;
  FILL_MODE_COLORIZE = 3;
}

message Point {
  float x = 1;
  float y = 2;
}

message StrokePath {
  repeated Point point = 1;
  int32 brush_color = 2;
  float brush_size = 3;
  float brush_softness = 4;
  int32 blur_type = 5;
}

// A single cutout, used in scrapbook demo.
message Cutout {
  // id of the cutout.
  string id = 1;

  // Rotation degree applied to the cutout.
  int32 rotation_degree = 2;

  // The width of the border.
  int32 border_width = 3;

  // The color of the border.
  int32 border_color = 4;

  // The fill color.
  int32 fill_color = 5;

  // The fill mode.
  FillMode fill_mode = 6;

  // Doodle stroke paths.
  repeated StrokePath doodle_stroke = 7;
}

// A collection of cutout, used in scrapbook demo.
message CutoutCollection {
  repeated Cutout cutout = 1;
}

// A single entry in the L1 hot memory system.
message HotMemoryEntry {
  // Unique key for this memory entry (e.g., "current_project").
  string key = 1;

  // The content of the memory entry.
  string content = 2;

  // Category: "project", "event", "fact", or "preference".
  string category = 3;

  // Timestamp when this entry was created.
  int64 created_ms = 4;

  // Optional TTL — entry expires after this timestamp. 0 means no expiry.
  int64 expires_ms = 5;

  // Model-assigned importance (1-10). Higher = more important.
  int32 priority = 6;
}

// L1 hot memory — always injected into the system prompt.
message HotMemory {
  repeated HotMemoryEntry entries = 1;
  int64 last_updated_ms = 2;
}

// Configuration for a single MCP server connection.
message McpServerConfig {
  string id = 1;
  string name = 2;
  string url = 3;
  string transport = 4;         // "http", "websocket", or "stdio"
  string auth_token = 5;        // encrypted via AndroidX Security Crypto
  bool auto_connect = 6;
  repeated string enabled_tools = 7;
  bool read_only = 8;
}

// Registry of all configured MCP servers.
message McpServerRegistry {
  repeated McpServerConfig servers = 1;
}
