<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUSK — Desiccated Circuitry</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --anthropic-dark: #141413;
            --anthropic-light: #faf9f5;
            --anthropic-mid-gray: #b0aea5;
            --anthropic-light-gray: #e8e6dc;
            --anthropic-orange: #d97757;
            --anthropic-blue: #6a9bcc;
            --anthropic-green: #788c5d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--anthropic-light) 0%, #f5f3ee 100%);
            min-height: 100vh;
            color: var(--anthropic-dark);
        }

        .container {
            display: flex;
            min-height: 100vh;
            padding: 20px;
            gap: 20px;
        }

        .sidebar {
            width: 320px;
            flex-shrink: 0;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(20,20,19,0.1);
            overflow-y: auto;
            overflow-x: hidden;
        }

        .sidebar h1 {
            font-family: 'Lora', serif;
            font-size: 24px;
            font-weight: 500;
            color: var(--anthropic-dark);
            margin-bottom: 8px;
        }

        .sidebar .subtitle {
            color: var(--anthropic-mid-gray);
            font-size: 14px;
            margin-bottom: 32px;
            line-height: 1.4;
        }

        .control-section { margin-bottom: 32px; }

        .control-section h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--anthropic-dark);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-section h3::before {
            content: '•';
            color: var(--anthropic-orange);
            font-weight: bold;
        }

        .seed-input {
            width: 100%;
            background: var(--anthropic-light);
            padding: 12px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            margin-bottom: 12px;
            border: 1px solid var(--anthropic-light-gray);
            text-align: center;
        }

        .seed-input:focus {
            outline: none;
            border-color: var(--anthropic-orange);
            box-shadow: 0 0 0 2px rgba(217,119,87,0.1);
            background: white;
        }

        .seed-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 8px;
        }

        .control-group { margin-bottom: 20px; }

        .control-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--anthropic-dark);
            margin-bottom: 8px;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .slider-container input[type="range"] {
            flex: 1;
            height: 4px;
            background: var(--anthropic-light-gray);
            border-radius: 2px;
            outline: none;
            -webkit-appearance: none;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: var(--anthropic-orange);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.1);
            background: #c86641;
        }

        .slider-container input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            background: var(--anthropic-orange);
            border-radius: 50%;
            border: none;
            cursor: pointer;
        }

        .value-display {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
            min-width: 60px;
            text-align: right;
        }

        .button {
            padding: 10px 16px;
            border: 1px solid var(--anthropic-light-gray);
            background: white;
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--anthropic-dark);
        }

        .button:hover {
            border-color: var(--anthropic-orange);
            color: var(--anthropic-orange);
        }

        .button-primary {
            background: var(--anthropic-dark);
            color: white;
            border-color: var(--anthropic-dark);
        }

        .button-primary:hover {
            background: #2a2a28;
            border-color: var(--anthropic-orange);
            color: var(--anthropic-orange);
        }

        .button-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .button-row .button { flex: 1; text-align: center; }

        .canvas-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #canvas-container {
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(20,20,19,0.15);
        }

        #canvas-container canvas { display: block; }

        .loading {
            padding: 40px;
            color: var(--anthropic-mid-gray);
            font-size: 14px;
        }

        @media (max-width: 900px) {
            .container { flex-direction: column; }
            .sidebar { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h1>Desiccated Circuitry</h1>
            <p class="subtitle">Generative brand texture for HUSK — organic fiber striations meet circuit-trace precision. Each seed reveals a unique composition.</p>

            <!-- Seed Section -->
            <div class="control-section">
                <h3>Seed</h3>
                <input type="text" id="seed-input" class="seed-input" value="12345" onchange="updateSeed()">
                <div class="seed-controls">
                    <button class="button" onclick="previousSeed()">← Prev</button>
                    <button class="button" onclick="nextSeed()">Next →</button>
                    <button class="button" onclick="randomSeedAndUpdate()">Random</button>
                    <button class="button button-primary" onclick="initializeSystem()">Regenerate</button>
                </div>
            </div>

            <!-- Parameters Section -->
            <div class="control-section">
                <h3>Parameters</h3>

                <div class="control-group">
                    <label>Fiber Count</label>
                    <div class="slider-container">
                        <input type="range" id="fiberCount" min="30" max="200" step="5" value="90" oninput="updateParam('fiberCount', this.value)">
                        <span class="value-display" id="fiberCount-value">90</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Trace Density</label>
                    <div class="slider-container">
                        <input type="range" id="traceDensity" min="5" max="40" step="1" value="18" oninput="updateParam('traceDensity', this.value)">
                        <span class="value-display" id="traceDensity-value">18</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Curvature</label>
                    <div class="slider-container">
                        <input type="range" id="curvature" min="0.001" max="0.015" step="0.001" value="0.006" oninput="updateParam('curvature', this.value)">
                        <span class="value-display" id="curvature-value">0.006</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Fiber Length</label>
                    <div class="slider-container">
                        <input type="range" id="fiberLength" min="50" max="500" step="10" value="250" oninput="updateParam('fiberLength', this.value)">
                        <span class="value-display" id="fiberLength-value">250</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Via Points</label>
                    <div class="slider-container">
                        <input type="range" id="viaCount" min="5" max="80" step="1" value="30" oninput="updateParam('viaCount', this.value)">
                        <span class="value-display" id="viaCount-value">30</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Amber Intensity</label>
                    <div class="slider-container">
                        <input type="range" id="amberIntensity" min="0" max="100" step="5" value="40" oninput="updateParam('amberIntensity', this.value)">
                        <span class="value-display" id="amberIntensity-value">40</span>
                    </div>
                </div>
            </div>

            <!-- Actions Section -->
            <div class="control-section">
                <h3>Actions</h3>
                <div class="button-row">
                    <button class="button" onclick="resetParameters()">Reset</button>
                    <button class="button" onclick="downloadPNG()">Download PNG</button>
                </div>
            </div>
        </div>

        <div class="canvas-area">
            <div id="canvas-container">
                <div class="loading">Initializing generative art...</div>
            </div>
        </div>
    </div>

    <script>
        // ═══════════════════════════════════════════════════════════════
        // PARAMETERS
        // ═══════════════════════════════════════════════════════════════

        let params = {
            seed: 12345,
            fiberCount: 90,
            traceDensity: 18,
            curvature: 0.006,
            fiberLength: 250,
            viaCount: 30,
            amberIntensity: 40
        };

        let defaultParams = { ...params };

        // ═══════════════════════════════════════════════════════════════
        // ALGORITHM: DESICCATED CIRCUITRY
        // Organic fiber striations driven by noise fields, punctuated
        // by rigid circuit-trace grid elements and amber via nodes.
        // ═══════════════════════════════════════════════════════════════

        let fibers = [];
        let traces = [];
        let vias = [];
        let drawn = false;

        function setup() {
            let canvas = createCanvas(1000, 1000);
            canvas.parent('canvas-container');
            pixelDensity(1);
            initializeSystem();
            document.querySelector('.loading').style.display = 'none';
        }

        function initializeSystem() {
            randomSeed(params.seed);
            noiseSeed(params.seed);
            drawn = false;

            fibers = [];
            traces = [];
            vias = [];

            // Generate organic fibers — curves driven by Perlin noise
            for (let i = 0; i < params.fiberCount; i++) {
                let fiber = [];
                let x = random(width);
                let y = random(height);
                let steps = int(params.fiberLength * random(0.5, 1.5));

                for (let s = 0; s < steps; s++) {
                    fiber.push({ x, y });
                    let angle = noise(x * params.curvature, y * params.curvature, params.seed * 0.01) * TWO_PI * 2;
                    // Add slight vertical bias (fibers tend to flow vertically like real husks)
                    angle += HALF_PI * 0.3;
                    x += cos(angle) * 1.5;
                    y += sin(angle) * 1.5;
                    // Wrap
                    if (x < -20 || x > width + 20 || y < -20 || y > height + 20) break;
                }
                if (fiber.length > 10) {
                    fibers.push({
                        points: fiber,
                        weight: random(0.3, 1.8),
                        brightness: random(25, 70)
                    });
                }
            }

            // Generate circuit traces — rigid horizontal/vertical segments
            let gridSpacing = max(20, int(width / params.traceDensity));
            for (let gx = gridSpacing; gx < width; gx += gridSpacing) {
                for (let gy = gridSpacing; gy < height; gy += gridSpacing) {
                    if (random() < 0.25) {
                        let len = random(gridSpacing * 0.5, gridSpacing * 2);
                        let horizontal = random() < 0.6;
                        traces.push({
                            x1: gx,
                            y1: gy,
                            x2: horizontal ? gx + len : gx,
                            y2: horizontal ? gy : gy + len,
                            brightness: random(18, 35)
                        });

                        // Sometimes add an L-bend
                        if (random() < 0.3) {
                            let bendLen = random(gridSpacing * 0.3, gridSpacing);
                            traces.push({
                                x1: horizontal ? gx + len : gx,
                                y1: horizontal ? gy : gy + len,
                                x2: horizontal ? gx + len : gx + bendLen,
                                y2: horizontal ? gy + bendLen : gy + len,
                                brightness: random(18, 30)
                            });
                        }
                    }
                }
            }

            // Generate via points — small amber circles at intersections
            for (let v = 0; v < params.viaCount; v++) {
                // Place vias near trace endpoints or at grid intersections
                let vx, vy;
                if (traces.length > 0 && random() < 0.6) {
                    let t = traces[int(random(traces.length))];
                    vx = random() < 0.5 ? t.x1 : t.x2;
                    vy = random() < 0.5 ? t.y1 : t.y2;
                } else {
                    vx = random(width);
                    vy = random(height);
                }
                vias.push({
                    x: vx,
                    y: vy,
                    r: random(2, 6),
                    hasRing: random() < 0.4,
                    glow: random() < 0.15
                });
            }

            loop();
        }

        function draw() {
            if (drawn) {
                noLoop();
                return;
            }

            // Background — near-black with subtle warm tone
            background(13, 13, 12);

            // Very subtle noise texture overlay
            loadPixels();
            for (let i = 0; i < pixels.length; i += 4) {
                let grain = random(-3, 3);
                pixels[i] = constrain(pixels[i] + grain, 0, 255);
                pixels[i + 1] = constrain(pixels[i + 1] + grain, 0, 255);
                pixels[i + 2] = constrain(pixels[i + 2] + grain - 1, 0, 255);
            }
            updatePixels();

            // Draw circuit traces first (underneath)
            for (let t of traces) {
                let b = t.brightness;
                stroke(b, b, b - 2);
                strokeWeight(0.8);
                line(t.x1, t.y1, t.x2, t.y2);
            }

            // Draw organic fibers
            noFill();
            for (let f of fibers) {
                let b = f.brightness;
                stroke(b, b, b - 2, 180);
                strokeWeight(f.weight);

                beginShape();
                for (let p of f.points) {
                    curveVertex(p.x, p.y);
                }
                endShape();
            }

            // Draw via points
            let amberAlpha = map(params.amberIntensity, 0, 100, 30, 255);
            for (let v of vias) {
                // Amber fill
                noStroke();
                fill(217, 145, 87, amberAlpha);
                ellipse(v.x, v.y, v.r * 2, v.r * 2);

                if (v.hasRing) {
                    noFill();
                    stroke(217, 145, 87, amberAlpha * 0.5);
                    strokeWeight(0.8);
                    ellipse(v.x, v.y, v.r * 4, v.r * 4);
                }

                if (v.glow) {
                    // Soft glow circle
                    noStroke();
                    for (let gr = 20; gr > 0; gr--) {
                        fill(217, 145, 87, amberAlpha * 0.02);
                        ellipse(v.x, v.y, v.r * 2 + gr * 3, v.r * 2 + gr * 3);
                    }
                }
            }

            // Faint center composition anchor — the "kernel"
            let cx = width / 2 + (noise(params.seed * 0.1) - 0.5) * 200;
            let cy = height / 2 + (noise(params.seed * 0.2) - 0.5) * 200;
            noStroke();
            for (let gr = 40; gr > 0; gr--) {
                fill(217, 145, 87, map(params.amberIntensity, 0, 100, 0.2, 1.5));
                ellipse(cx, cy, gr * 4, gr * 4);
            }
            fill(217, 145, 87, amberAlpha * 0.9);
            ellipse(cx, cy, 6, 6);
            noFill();
            stroke(217, 145, 87, amberAlpha * 0.4);
            strokeWeight(0.8);
            ellipse(cx, cy, 20, 20);

            drawn = true;
        }

        // ═══════════════════════════════════════════════════════════════
        // UI HANDLERS
        // ═══════════════════════════════════════════════════════════════

        function updateParam(paramName, value) {
            let numVal = parseFloat(value);
            params[paramName] = numVal;
            document.getElementById(paramName + '-value').textContent = value;
            initializeSystem();
        }

        function updateSeedDisplay() {
            document.getElementById('seed-input').value = params.seed;
        }

        function updateSeed() {
            let input = document.getElementById('seed-input');
            let newSeed = parseInt(input.value);
            if (newSeed && newSeed > 0) {
                params.seed = newSeed;
                initializeSystem();
            } else {
                updateSeedDisplay();
            }
        }

        function previousSeed() {
            params.seed = Math.max(1, params.seed - 1);
            updateSeedDisplay();
            initializeSystem();
        }

        function nextSeed() {
            params.seed++;
            updateSeedDisplay();
            initializeSystem();
        }

        function randomSeedAndUpdate() {
            params.seed = Math.floor(Math.random() * 999999) + 1;
            updateSeedDisplay();
            initializeSystem();
        }

        function resetParameters() {
            params = { ...defaultParams };
            document.getElementById('fiberCount').value = params.fiberCount;
            document.getElementById('fiberCount-value').textContent = params.fiberCount;
            document.getElementById('traceDensity').value = params.traceDensity;
            document.getElementById('traceDensity-value').textContent = params.traceDensity;
            document.getElementById('curvature').value = params.curvature;
            document.getElementById('curvature-value').textContent = params.curvature;
            document.getElementById('fiberLength').value = params.fiberLength;
            document.getElementById('fiberLength-value').textContent = params.fiberLength;
            document.getElementById('viaCount').value = params.viaCount;
            document.getElementById('viaCount-value').textContent = params.viaCount;
            document.getElementById('amberIntensity').value = params.amberIntensity;
            document.getElementById('amberIntensity-value').textContent = params.amberIntensity;
            updateSeedDisplay();
            initializeSystem();
        }

        function downloadPNG() {
            saveCanvas('husk_texture_' + params.seed, 'png');
        }

        window.addEventListener('load', function () {
            updateSeedDisplay();
        });
    </script>
</body>
</html>
